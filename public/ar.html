<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR View</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        #overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
        }
        #overlay p { color: white; font-family: -apple-system, sans-serif; font-size: 16px; margin-top: 16px; }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #close-btn {
            position: fixed; top: 24px; left: 24px; z-index: 1000;
            width: 48px; height: 48px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            border: none; border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        #close-btn svg { width: 24px; height: 24px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; }
        #hint {
            position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 16px 24px;
            border-radius: 24px;
            color: white;
            font-family: -apple-system, sans-serif;
            font-size: 14px;
            text-align: center;
            width: 80%;
            max-width: 320px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="spinner"></div>
        <p id="status-text">AR yükleniyor...</p>
    </div>

    <button id="close-btn" onclick="window.close(); window.history.back();">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>

    <div id="hint">Kamerayı düz bir yüzeye ya da nesneye tutun. Görsel üzerinde belirecek.</div>

    <script>
        // URL'den görsel URL'sini al
        const params = new URLSearchParams(window.location.search);
        const imageUrl = params.get('img');

        if (!imageUrl) {
            document.getElementById('status-text').textContent = 'Hata: Görüntü URL\'si bulunamadı.';
        } else {
            document.getElementById('status-text').textContent = 'Kamera ve AR hazırlanıyor...';

            // A-Frame sahnesi oluştur
            const scene = document.createElement('a-scene');
            scene.setAttribute('mindar-image', `imageTargetSrc: https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: #scanning`);
            scene.setAttribute('color-space', 'sRGB');
            scene.setAttribute('renderer', 'colorManagement: true, physicallyCorrectLights');
            scene.setAttribute('vr-mode-ui', 'enabled: false');
            scene.setAttribute('device-orientation-permission-ui', 'enabled: false');
            scene.setAttribute('embedded', '');
            scene.style.cssText = 'width:100vw;height:100vh;';

            const assets = document.createElement('a-assets');
            const img = document.createElement('img');
            img.id = 'ar-image';
            img.setAttribute('crossorigin', 'anonymous');
            img.src = imageUrl;
            img.onload = () => console.log('Image loaded');
            img.onerror = () => console.error('Image load error');
            assets.appendChild(img);
            scene.appendChild(assets);

            const camera = document.createElement('a-camera');
            camera.setAttribute('position', '0 0 0');
            camera.setAttribute('look-controls', 'enabled: false');
            scene.appendChild(camera);

            const entity = document.createElement('a-entity');
            entity.setAttribute('mindar-image-target', 'targetIndex: 0');

            const plane = document.createElement('a-plane');
            plane.setAttribute('src', '#ar-image');
            plane.setAttribute('position', '0 0 0');
            plane.setAttribute('height', '0.552');
            plane.setAttribute('width', '1');
            plane.setAttribute('rotation', '0 0 0');
            entity.appendChild(plane);
            scene.appendChild(entity);

            document.body.appendChild(scene);

            scene.addEventListener('loaded', () => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('hint').style.display = 'block';
            });

            scene.addEventListener('arError', (e) => {
                document.getElementById('status-text').textContent = 'AR başlatılamadı: Kamera iznini kontrol edin.';
            });
        }
    </script>
</body>
</html>
