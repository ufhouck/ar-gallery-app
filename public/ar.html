<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>AR Görünüm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #camera {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #ar-image {
            position: fixed;
            cursor: grab;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 4px;
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.5);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            max-width: 80vw;
            max-height: 70vh;
        }

        #ar-image:active {
            cursor: grabbing;
        }

        #close-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #close-btn svg {
            width: 22px;
            height: 22px;
            stroke: #fff;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        #controls {
            position: fixed;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .ctrl-btn {
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        #hint {
            position: fixed;
            bottom: 108px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            text-align: center;
            white-space: nowrap;
        }

        #overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #overlay.hidden {
            display: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #overlay p {
            color: #fff;
            font-size: 15px;
        }

        #error {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 32px;
            text-align: center;
        }

        #error.hidden {
            display: none;
        }

        #error p {
            color: #f87171;
            font-size: 15px;
        }

        #error button {
            padding: 12px 28px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="overlay">
        <div class="spinner"></div>
        <p>Kamera açılıyor...</p>
    </div>

    <div id="error" class="hidden">
        <p id="error-msg">Kamera açılamadı.</p>
        <button onclick="history.back()">Geri Dön</button>
    </div>

    <video id="camera" autoplay playsinline muted></video>

    <img id="ar-image" draggable="false" alt="AR görüntü">

    <button id="close-btn" onclick="history.back()" aria-label="Kapat">
        <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
    </button>

    <div id="hint">Sürükle • Küçült/Büyüt</div>

    <div id="controls">
        <button class="ctrl-btn" id="btn-minus" aria-label="Küçült">−</button>
        <button class="ctrl-btn" id="btn-opacity" aria-label="Saydamlık" title="Saydamlık">◑</button>
        <button class="ctrl-btn" id="btn-plus" aria-label="Büyüt">+</button>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const imageUrl = params.get('img');
        const overlay = document.getElementById('overlay');
        const errorDiv = document.getElementById('error');
        const errorMsg = document.getElementById('error-msg');
        const video = document.getElementById('camera');
        const arImg = document.getElementById('ar-image');

        let imgScale = 1;
        let imgOpacity = 1;
        let imgX = 0, imgY = 0;

        function setArImagePos() {
            arImg.style.left = imgX + 'px';
            arImg.style.top = imgY + 'px';
        }

        function showError(msg) {
            overlay.classList.add('hidden');
            errorMsg.textContent = msg;
            errorDiv.classList.remove('hidden');
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    overlay.classList.add('hidden');
                    // Görseli ortala
                    const w = Math.min(window.innerWidth * 0.6, 360);
                    arImg.style.width = w + 'px';
                    arImg.style.height = 'auto';
                    imgX = (window.innerWidth - w) / 2;
                    imgY = (window.innerHeight - w * 0.75) / 2;
                    setArImagePos();
                };
            } catch (err) {
                showError('Kamera açılamadı. Tarayıcı ayarlarından kamera iznini verdiğinizden emin olun.');
            }
        }

        if (!imageUrl) {
            showError('Görüntü URL\'si bulunamadı.');
        } else {
            arImg.src = imageUrl;
            arImg.crossOrigin = 'anonymous';
            startCamera();
        }

        // --- DRAG (Mouse + Touch) ---
        let dragging = false, startX = 0, startY = 0, origX = 0, origY = 0;
        let pinching = false, pinchDist0 = 0, scaleAtPinch = 1;

        function getDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        arImg.addEventListener('mousedown', e => {
            dragging = true; startX = e.clientX; startY = e.clientY;
            origX = imgX; origY = imgY; e.preventDefault();
        });
        document.addEventListener('mousemove', e => {
            if (!dragging) return;
            imgX = origX + (e.clientX - startX);
            imgY = origY + (e.clientY - startY);
            setArImagePos();
        });
        document.addEventListener('mouseup', () => { dragging = false; });

        arImg.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                pinching = true; dragging = false;
                pinchDist0 = getDistance(e.touches);
                scaleAtPinch = imgScale;
            } else if (e.touches.length === 1) {
                dragging = true;
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                origX = imgX; origY = imgY;
            }
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', e => {
            if (pinching && e.touches.length === 2) {
                const dist = getDistance(e.touches);
                imgScale = Math.min(3, Math.max(0.2, scaleAtPinch * (dist / pinchDist0)));
                arImg.style.transform = `scale(${imgScale})`;
                arImg.style.transformOrigin = 'top left';
            } else if (dragging && e.touches.length === 1) {
                imgX = origX + (e.touches[0].clientX - startX);
                imgY = origY + (e.touches[0].clientY - startY);
                setArImagePos();
            }
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchend', e => {
            if (e.touches.length < 2) pinching = false;
            if (e.touches.length === 0) dragging = false;
        });

        // --- CONTROLS ---
        document.getElementById('btn-plus').addEventListener('click', () => {
            imgScale = Math.min(3, imgScale + 0.2);
            arImg.style.transform = `scale(${imgScale})`;
            arImg.style.transformOrigin = 'top left';
        });
        document.getElementById('btn-minus').addEventListener('click', () => {
            imgScale = Math.max(0.2, imgScale - 0.2);
            arImg.style.transform = `scale(${imgScale})`;
            arImg.style.transformOrigin = 'top left';
        });
        document.getElementById('btn-opacity').addEventListener('click', () => {
            imgOpacity = imgOpacity === 1 ? 0.5 : 1;
            arImg.style.opacity = imgOpacity;
        });
    </script>
</body>

</html>
